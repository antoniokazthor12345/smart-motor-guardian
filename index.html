<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Smart Motor Guardian
</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#08110c;
color:#00ff88;

font-family:'Orbitron';

padding:20px;
}

.container{

max-width:1000px;
margin:auto;
}

h1{

text-align:center;

margin-bottom:20px;
}

.status{

text-align:center;

margin-bottom:25px;

font-size:14px;
}

.grid{

display:grid;

grid-template-columns:
repeat(3,1fr);

gap:20px;

margin-bottom:20px;
}

.card{

border:1px solid #00ff88;

border-radius:10px;

padding:20px;

text-align:center;
}

.label{

font-size:12px;

opacity:.7;

margin-bottom:10px;
}

.value{

font-size:28px;

font-weight:900;
}

.alert{

color:#ff3355;
}

.warn{

color:#ffdd00;
}

.chartCard{

border:1px solid #00ff88;

border-radius:10px;

padding:20px;
}

canvas{

width:100%;
}

@media(max-width:768px){

.grid{

grid-template-columns:
1fr;
}

}

</style>
</head>
<body>

<div class="container">

<h1>
SMART MOTOR GUARDIAN
</h1>

<div
class="status"
id="mqttStatus">

CONNECTING...
</div>

<div class="grid">

<div class="card">
<div class="label">
TEMPERATURE
</div>
<div
class="value"
id="temp">
--
</div>
</div>

<div class="card">
<div class="label">
CURRENT
</div>
<div
class="value"
id="amp">
--
</div>
</div>

<div class="card">
<div class="label">
RPM
</div>
<div
class="value"
id="rpm">
--
</div>
</div>

<div class="card">
<div class="label">
VIBRATION
</div>
<div
class="value"
id="vib">
--
</div>
</div>

<div class="card">
<div class="label">
MACHINE STATUS
</div>
<div
class="value"
id="machineStatus">
--
</div>
</div>

<div class="card">
<div class="label">
LAST UPDATE
</div>
<div
class="value"
id="lastUpdate"
style="font-size:16px">
--
</div>
</div>

</div>


<div class="chartCard">

<canvas
id="liveChart">
</canvas>

</div>

</div>

<script>

// ====================================
// MQTT
// ====================================

const client =
mqtt.connect(

"wss://0d6666edf86b49058c829f4e72fa5d76.s1.eu.hivemq.cloud:8884/mqtt",

{

username:"esp32",

password:"Esp32Cloude11"

}

);


// ====================================
// UI
// ====================================

const tempEl =
document.getElementById(
'temp'
);

const ampEl =
document.getElementById(
'amp'
);

const rpmEl =
document.getElementById(
'rpm'
);

const vibEl =
document.getElementById(
'vib'
);

const machineEl =
document.getElementById(
'machineStatus'
);

const mqttEl =
document.getElementById(
'mqttStatus'
);

const timeEl =
document.getElementById(
'lastUpdate'
);


// ====================================
// CHART
// ====================================

const labels = [];

const tempData = [];
const ampData = [];
const rpmData = [];


const chart =
new Chart(

document.getElementById(
'liveChart'
),

{

type:'line',

data:{

labels:labels,

datasets:[

{

label:'TEMP',

data:tempData

},

{

label:'AMP',

data:ampData

},

{

label:'RPM',

data:rpmData

}

]

},

options:{

responsive:true,

animation:false

}

}

);


// ====================================
// CHART UPDATE
// ====================================

function pushData(
t,
a,
r
){

const now =
new Date()
.toLocaleTimeString();

labels.push(
now
);

tempData.push(
t
);

ampData.push(
a
);

rpmData.push(
r
);


if(
labels.length>20
){

labels.shift();

tempData.shift();

ampData.shift();

rpmData.shift();

}


chart.update();


timeEl.textContent =
now;

}


// ====================================
// LIVE DATA
// ====================================

let currentTemp = 0;
let currentAmp = 0;
let currentRPM = 0;


// ====================================
// MQTT
// ====================================

client.on(

'connect',

()=>{

mqttEl.textContent =
'MQTT ONLINE';

client.subscribe(
'tony/factory/#'
);

}

);


client.on(

'message',

(topic,message)=>{

const value =
message.toString();


// TEMP

if(
topic.includes(
'temp'
)
){

currentTemp =
parseFloat(
value
);

tempEl.textContent =
value+' C';

}


// AMP

if(
topic.includes(
'amp'
)
){

currentAmp =
parseFloat(
value
);

ampEl.textContent =
value+' A';

}


// RPM

if(
topic.includes(
'rpm'
)
){

currentRPM =
parseInt(
value
);

rpmEl.textContent =
value;

pushData(

currentTemp,

currentAmp,

currentRPM

);

}


// VIB

if(
topic.includes(
'vib'
)
){

if(
value=="1"
){

vibEl.textContent =
'ALERT';

vibEl.className =
'value alert';

}else{

vibEl.textContent =
'OK';

vibEl.className =
'value';

}

}


// STATUS

if(
topic.includes(
'status'
)
){

if(
value=="0"
){

machineEl.textContent =
'NORMAL';

machineEl.className =
'value';

}

else if(
value=="1"
){

machineEl.textContent =
'WARNING';

machineEl.className =
'value warn';

}

else{

machineEl.textContent =
'CRITICAL';

machineEl.className =
'value alert';

}

}

}

);

</script>

</body>
</html>
